<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>PWA Example</title>
</head>
<body>
    <header>
        <h1>Welcome to the PWA</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#docs">Documentation</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Features</h2>
            <p>This PWA includes offline capability, mobile responsiveness, and install as app functionality.</p>
        </section>
        <section id="docs">
            <h2>Documentation</h2>
            <p>For more information, refer to the README.md file.</p>
        </section>
        <section id="contact">
            <h2>Contact/Links</h2>
            <p>For inquiries, please contact us via our website.</p>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
